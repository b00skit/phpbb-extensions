<style>

	color: #6b21a8;
}

	transition: all 0.2s ease-in-out;
}

	border-color: #a855f7 !important;
}
@media (max-width: 700px) {
	.group-row {
		grid-template-columns: 1fr !important;
	}
}
</style>

<script>
function addGroupRow(groupName) {
	var container = document.getElementById('group_rows_' + groupName);
	if (!container) return;
	var rows = container.querySelectorAll('.group-row');
	var lastRow = rows[rows.length - 1];
	var nextIndex = lastRow ? parseInt(lastRow.getAttribute('data-index')) + 1 : 0;
	
	var firstRow = container.querySelector('.group-row[data-index="0"]');
	if (!firstRow) return;
	
	var newRow = firstRow.cloneNode(true);
	newRow.setAttribute('data-index', nextIndex);
	
	var inputs = newRow.querySelectorAll('input, textarea, select');
	inputs.forEach(function(input) {
		if (input.name) {
			input.name = input.name.replace(/\[\d+\]/, '[' + nextIndex + ']');
		}
		if (input.id) {
			input.id = input.id.replace(/_0$/, '_' + nextIndex);
		}
		if (input.type === 'checkbox' || input.type === 'radio') {
			input.checked = false;
		} else {
			input.value = '';
		}
	});
	
	var labels = newRow.querySelectorAll('label');
	labels.forEach(function(label) {
		if (label.htmlFor) {
			label.htmlFor = label.htmlFor.replace(/_0$/, '_' + nextIndex);
		}
	});
	
	var oldBtn = newRow.querySelector('.remove-row-btn');
	if (oldBtn) oldBtn.parentNode.removeChild(oldBtn);
	
	var removeBtn = document.createElement('button');
	removeBtn.type = 'button';
	removeBtn.className = 'button2 remove-row-btn';
	removeBtn.innerHTML = 'Remove';
	removeBtn.style.position = 'absolute';
	removeBtn.style.top = '10px';
	removeBtn.style.right = '10px';
	removeBtn.style.padding = '2px 8px';
	removeBtn.style.fontSize = '0.8em';
	removeBtn.style.backgroundColor = '#f87171';
	removeBtn.style.color = '#fff';
	removeBtn.style.border = 'none';
	removeBtn.style.borderRadius = '4px';
	removeBtn.style.cursor = 'pointer';
	removeBtn.onclick = function() {
		newRow.parentNode.removeChild(newRow);
	};
	newRow.appendChild(removeBtn);
	
	container.appendChild(newRow);
}

document.addEventListener('DOMContentLoaded', function() {
	var submittedDataRaw = '{SUBMITTED_DATA_JSON}';
	if (!submittedDataRaw) return;
	
	var submittedData = {};
	try {
		submittedData = JSON.parse(submittedDataRaw.replace(/&quot;/g, '"'));
	} catch (e) {
		console.error('Failed to parse submitted data JSON', e);
		return;
	}
	
	var wrappers = document.querySelectorAll('.input-group-wrapper[data-multi="1"]');
	wrappers.forEach(function(wrapper) {
		var groupName = wrapper.getAttribute('data-name');
		var firstRow = wrapper.querySelector('.group-row[data-index="0"]');
		if (!firstRow) return;
		
		var fieldNames = [];
		var inputs = firstRow.querySelectorAll('input, textarea, select');
		inputs.forEach(function(input) {
			var match = input.name.match(/^([^\[]+)\[\d+\]/);
			if (match) {
				var cleanName = match[1];
				if (fieldNames.indexOf(cleanName) === -1) {
					fieldNames.push(cleanName);
				}
			}
		});
		
		var maxRows = 1;
		fieldNames.forEach(function(name) {
			if (submittedData[name] && Array.isArray(submittedData[name])) {
				if (submittedData[name].length > maxRows) {
					maxRows = submittedData[name].length;
				}
			}
		});
		
		for (var i = 1; i < maxRows; i++) {
			addGroupRow(groupName);
		}
		
		for (var i = 0; i < maxRows; i++) {
			var row = wrapper.querySelector('.group-row[data-index="' + i + '"]');
			if (!row) continue;
			
			fieldNames.forEach(function(name) {
				var vals = submittedData[name];
				if (vals === undefined) return;
				
				var val = Array.isArray(vals) ? vals[i] : (i === 0 ? vals : '');
				if (val === undefined) val = '';
				
				var rowInputs = row.querySelectorAll('[name^="' + name + '[' + i + ']"]');
				rowInputs.forEach(function(input) {
					if (input.type === 'checkbox') {
						var cellVal = Array.isArray(vals) ? vals[i] : vals;
						if (Array.isArray(cellVal)) {
							input.checked = cellVal.indexOf(input.value) !== -1;
						} else {
							input.checked = (String(cellVal) === String(input.value));
						}
					} else if (input.type === 'radio') {
						var cellVal = Array.isArray(vals) ? vals[i] : vals;
						input.checked = (String(cellVal) === String(input.value));
					} else {
						input.value = val;
					}
				});
			});
		}
	});
});
</script>
