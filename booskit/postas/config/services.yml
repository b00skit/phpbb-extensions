parameters:
    booskit.postas.postas_table: '%core.table_prefix%phpbb_postas'

services:
    booskit.postas.listener:
        class: booskit\postas\event\listener
        arguments:
            - '@dbal.conn'
            - '@user'
            - '@template'
            - '@request'
            - '%core.table_prefix%'
            - '@config'
        tags:
            - { name: event.listener }
    booskit.postas.controller.acp:
        class: booskit\postas\controller\acp_controller
        arguments:
            - '@config'
            - '@language'
            - '@log'
            - '@request'
            - '@template'
            - '@user'
